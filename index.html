<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="description" content="Ruleta online - Configura numeros o nombres y haz girar la ruleta">
	<title>Ruleta</title>
	<link rel="icon" type="image/svg+xml" href="favicon.svg">
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
	<link
		href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
		rel="stylesheet">
	<link rel="stylesheet" href="css/style.css">
</head>

<body>
	<button class="sidebar-toggle" id="sidebarToggle" aria-label="Abrir configuracion">
		<span class="material-symbols-outlined">tune</span>
	</button>

	<aside class="sidebar" id="sidebar" aria-label="Panel de configuracion">
		<div class="sidebar-header">
			<h2 class="sidebar-title">Configuracion</h2>
			<button class="sidebar-close" id="sidebarClose" aria-label="Cerrar configuracion">
				<span class="material-symbols-outlined">close</span>
			</button>
		</div>

		<div class="sidebar-body">
			<div class="sidebar-tabs">
				<button class="sidebar-tab active" data-tab="numbers" id="tabNumbers">
					<span class="material-symbols-outlined">123</span>
					Numeros
				</button>
				<button class="sidebar-tab" data-tab="names" id="tabNames">
					<span class="material-symbols-outlined">badge</span>
					Nombres
				</button>
			</div>

			<div class="tab-content active" id="numbersTab">
				<div class="form-group">
					<label class="form-label" for="rangeFrom">Desde</label>
					<input class="form-input" type="number" id="rangeFrom" value="1" min="0" max="999">
				</div>
				<div class="form-group">
					<label class="form-label" for="rangeTo">Hasta</label>
					<input class="form-input" type="number" id="rangeTo" value="10" min="1" max="1000">
				</div>

				<div class="form-group">
					<label class="form-label">Opciones adicionales</label>
					<label class="form-checkbox">
						<input type="checkbox" id="includeZero">
						<span>Incluir el 0</span>
					</label>
				</div>

				<button class="btn btn-primary btn-full" id="applyNumbers">Aplicar numeros</button>
			</div>

			<div class="tab-content" id="namesTab">
				<div class="name-input-row">
					<input class="form-input" type="text" id="nameInput" placeholder="Escribe un nombre...">
					<button class="btn btn-primary" id="addNameBtn">
						<span class="material-symbols-outlined">add</span>
					</button>
				</div>
				<p class="form-hint">Presiona Enter o haz clic en + para agregar</p>

				<div class="name-list" id="nameList">
					<p class="name-list-empty">No hay nombres agregados</p>
				</div>

				<button class="btn btn-primary btn-full" id="applyNames">Aplicar nombres</button>
			</div>
		</div>
	</aside>

	<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

	<main class="main-content">
		<header class="app-header">
			<h1 class="app-title">Ruleta</h1>
			<p class="app-subtitle">Configura desde el panel lateral y haz girar</p>
		</header>

		<section class="roulette-section" aria-label="Ruleta">
			<div class="roulette-container">
				<div class="roulette-pointer">
					<span class="material-symbols-outlined">play_arrow</span>
				</div>
				<canvas id="rouletteCanvas" width="500" height="500"></canvas>
			</div>

			<button class="btn btn-spin" id="spinBtn">
				<span class="material-symbols-outlined">casino</span>
				Girar
			</button>

			<div class="result-box" id="resultBox" aria-live="polite">
				<span class="result-label">Resultado:</span>
				<span class="result-value" id="resultValue">---</span>
			</div>
		</section>
	</main>

	<script type="module" src="js/app.js"></script>
</body>

</html>
